name: Resolve Pending Results

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve pending matches
        run: python scripts/resolve_pending.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json scripts/pending_review.json
          if git diff --staged --quiet; then
            echo "No changes — make sure you added \"winner\" fields to pending_review.json first."
          else
            git commit -m "chore: resolve pending results [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
